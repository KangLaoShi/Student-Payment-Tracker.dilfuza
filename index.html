<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>学生付费跟进系统 - Student Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap');
        body { font-family: 'Inter', sans-serif; }
        [v-cloak] { display: none; }
        .filter-chip.active {
            background-color: #2563eb;
            color: white;
            border-color: #2563eb;
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 min-h-screen p-4 md:p-8">
    <div id="app" class="max-w-6xl mx-auto">
        <!-- Header -->
        <div class="flex flex-col md:flex-row md:items-center justify-between mb-8 gap-6">
            <div>
                <h1 id="page-title" class="text-3xl font-extrabold text-slate-800 tracking-tight">学生付费跟进管理</h1>
                <p id="page-subtitle" class="text-slate-500 mt-1 font-medium">课包规格：12 节课/包</p>
            </div>
            <div class="flex items-center gap-3">
                <!-- Language Picker -->
                <div class="relative group">
                    <button class="flex items-center gap-2 bg-white border border-slate-200 px-4 py-2.5 rounded-xl text-slate-700 hover:bg-slate-50 transition-all shadow-sm">
                        <i data-lucide="globe" class="w-4 h-4 text-blue-500"></i>
                        <span id="current-lang-label" class="font-semibold uppercase text-sm">ZH</span>
                        <i data-lucide="chevron-down" class="w-3 h-3 text-slate-400"></i>
                    </button>
                    <div class="absolute right-0 mt-2 w-32 bg-white border border-slate-100 rounded-xl shadow-xl opacity-0 invisible group-hover:opacity-100 group-hover:visible transition-all z-50 overflow-hidden">
                        <button onclick="setLang('zh')" class="w-full text-left px-4 py-2 text-sm hover:bg-blue-50 transition-colors">中文</button>
                        <button onclick="setLang('uz')" class="w-full text-left px-4 py-2 text-sm hover:bg-blue-50 transition-colors">O'zbek</button>
                        <button onclick="setLang('ru')" class="w-full text-left px-4 py-2 text-sm hover:bg-blue-50 transition-colors">Русский</button>
                        <button onclick="setLang('en')" class="w-full text-left px-4 py-2 text-sm hover:bg-blue-50 transition-colors">English</button>
                    </div>
                </div>
                
                <button onclick="toggleModal(true)" class="flex items-center justify-center gap-2 bg-blue-600 hover:bg-blue-700 text-white px-6 py-2.5 rounded-xl transition-all shadow-lg active:scale-95 font-bold">
                    <i data-lucide="plus" class="w-5 h-5"></i> 
                    <span id="add-btn-text">添加新学生</span>
                </button>
            </div>
        </div>

        <!-- Dashboard Stats -->
        <div class="grid grid-cols-1 sm:grid-cols-3 gap-6 mb-8">
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100 flex items-center gap-4">
                <div class="p-4 bg-blue-50 text-blue-600 rounded-2xl"><i data-lucide="user" class="w-6 h-6"></i></div>
                <div>
                    <p id="stat-total-label" class="text-xs font-bold text-slate-400 uppercase tracking-wider">在籍学生</p>
                    <p id="stat-total-val" class="text-3xl font-black text-slate-800">0</p>
                </div>
            </div>
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100 flex items-center gap-4">
                <div class="p-4 bg-amber-50 text-amber-600 rounded-2xl"><i data-lucide="clock" class="w-6 h-6"></i></div>
                <div>
                    <p id="stat-warning-label" class="text-xs font-bold text-slate-400 uppercase tracking-wider">预警人数</p>
                    <p id="stat-warning-val" class="text-3xl font-black text-amber-600">0</p>
                </div>
            </div>
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100 flex items-center gap-4">
                <div class="p-4 bg-rose-50 text-rose-600 rounded-2xl"><i data-lucide="alert-circle" class="w-6 h-6"></i></div>
                <div>
                    <p id="stat-overdue-label" class="text-xs font-bold text-slate-400 uppercase tracking-wider">待续费</p>
                    <p id="stat-overdue-val" class="text-3xl font-black text-rose-600">0</p>
                </div>
            </div>
        </div>

        <!-- Teacher Filter Chips -->
        <div class="mb-6 flex flex-wrap items-center gap-2">
            <span id="filter-label" class="text-xs font-black text-slate-400 uppercase tracking-widest mr-2">筛选老师:</span>
            <div id="teacher-filter-container" class="flex flex-wrap gap-2">
                <!-- JS will inject chips -->
            </div>
        </div>

        <!-- Table Container -->
        <div class="bg-white rounded-3xl shadow-sm border border-slate-100 overflow-hidden">
            <div class="overflow-x-auto">
                <table class="w-full text-left">
                    <thead class="bg-slate-50/50 border-b border-slate-100">
                        <tr id="table-head-row">
                            <!-- JS will inject headers -->
                        </tr>
                    </thead>
                    <tbody id="student-table-body" class="divide-y divide-slate-50">
                        <!-- JS will inject rows -->
                    </tbody>
                </table>
            </div>
            <div id="no-data" class="hidden py-20 text-center flex flex-col items-center">
                <div class="bg-slate-50 p-6 rounded-full mb-4">
                    <i data-lucide="user-x" class="w-10 h-10 text-slate-200"></i>
                </div>
                <p id="no-data-text" class="text-slate-400 font-bold italic">暂无记录</p>
            </div>
        </div>

        <!-- Modal -->
        <div id="modal-overlay" class="fixed inset-0 bg-slate-900/40 backdrop-blur-md hidden items-center justify-center p-4 z-[100]">
            <div class="bg-white rounded-[2rem] shadow-2xl w-full max-w-md p-8 overflow-y-auto max-h-[90vh]">
                <h3 id="modal-title" class="text-2xl font-black mb-6 text-slate-800 flex items-center gap-3">添加新学生</h3>
                <form id="add-student-form" class="space-y-4">
                    <div>
                        <label id="label-name" class="block text-xs font-black text-slate-400 uppercase mb-2">姓名</label>
                        <input id="input-name" type="text" required class="w-full px-5 py-3 bg-slate-50 border rounded-2xl font-bold outline-none focus:border-blue-500">
                    </div>
                    <div>
                        <label id="label-teacher" class="block text-xs font-black text-slate-400 uppercase mb-2">任课老师</label>
                        <select id="input-teacher" required class="w-full px-5 py-3 bg-slate-50 border rounded-2xl font-bold outline-none focus:border-blue-500 appearance-none">
                            <option value="" disabled selected id="opt-placeholder-teacher">选择老师</option>
                            <option value="Kanglaoshi">Kanglaoshi</option>
                            <option value="Lilaoshi">Lilaoshi</option>
                            <option value="Pailaoshi">Pailaoshi</option>
                            <option value="Anlaoshi">Anlaoshi</option>
                            <option value="Tielaoshi">Tielaoshi</option>
                            <option value="Lanyinglaoshi">Lanyinglaoshi</option>
                        </select>
                    </div>
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label id="label-total" class="block text-xs font-black text-slate-400 uppercase mb-2">课包总量</label>
                            <input id="input-total" type="number" value="12" required class="w-full px-5 py-3 bg-slate-50 border rounded-2xl font-bold">
                        </div>
                        <div>
                            <label id="label-used" class="block text-xs font-black text-slate-400 uppercase mb-2">已上课时</label>
                            <input id="input-used" type="number" value="0" required class="w-full px-5 py-3 bg-slate-50 border rounded-2xl font-bold">
                        </div>
                    </div>
                    <div>
                        <label id="label-date" class="block text-xs font-black text-slate-400 uppercase mb-2">付费日期</label>
                        <input id="input-date" type="date" class="w-full px-5 py-3 bg-slate-50 border rounded-2xl font-bold">
                    </div>
                    <div class="flex gap-4 mt-8">
                        <button type="button" onclick="toggleModal(false)" id="btn-cancel" class="flex-1 py-3 border rounded-2xl font-bold text-slate-500">取消</button>
                        <button type="submit" id="btn-save" class="flex-1 py-3 bg-blue-600 text-white font-bold rounded-2xl shadow-lg">保存</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script>
        const translations = {
            zh: {
                title: "学生付费跟进管理", subtitle: "课包规格：12 节课/包", addBtn: "添加新学生",
                statTotal: "在籍学生", statWarning: "预警人数 (≤3节)", statOverdue: "待续费",
                thName: "学生姓名", thTeacher: "老师", thProgress: "进度", thRemaining: "剩余", thLastPay: "上次付费", thStatus: "状态", thActions: "操作",
                statusPaid: "充足", statusWarning: "预警", statusOverdue: "欠费",
                modalTitle: "添加新学生", labelName: "姓名", labelTeacher: "老师", labelTotal: "总量", labelUsed: "已上", labelPayDate: "日期",
                btnCancel: "取消", btnSave: "确认保存", noData: "暂无记录", confirmDelete: "确定删除吗？",
                filterAll: "全部", filterLabel: "筛选老师:"
            },
            uz: {
                title: "Talabalar Nazorati", subtitle: "Paket: 12 dars", addBtn: "Yangi talaba",
                statTotal: "Talabalar", statWarning: "Ogohlantirish", statOverdue: "To'lov kutilmoqda",
                thName: "Ismi", thTeacher: "O'qituvchi", thProgress: "Holati", thRemaining: "Qolgan", thLastPay: "To'lov sanasi", thStatus: "Holati", thActions: "Amallar",
                statusPaid: "Yetarli", statusWarning: "Muddati yaqin", statusOverdue: "To'lov kerak",
                modalTitle: "Yangi talaba qo'shish", labelName: "Ism", labelTeacher: "O'qituvchi", labelTotal: "Jami", labelUsed: "O'tilgan", labelPayDate: "Sana",
                btnCancel: "Bekor qilish", btnSave: "Saqlash", noData: "Ma'lumot yo'q", confirmDelete: "O'chirilsinmi?",
                filterAll: "Hammasi", filterLabel: "O'qituvchi bo'yicha:"
            },
            ru: {
                title: "Контроль студентов", subtitle: "Пакет: 12 уроков", addBtn: "Добавить студента",
                statTotal: "Всего", statWarning: "Внимание", statOverdue: "Нужна оплата",
                thName: "Имя", thTeacher: "Учитель", thProgress: "Прогресс", thRemaining: "Осталось", thLastPay: "Оплата", thStatus: "Статус", thActions: "Действия",
                statusPaid: "Оплачено", statusWarning: "Истекает", statusOverdue: "Долг",
                modalTitle: "Добавить студента", labelName: "Имя", labelTeacher: "Учитель", labelTotal: "Всего", labelUsed: "Пройдено", labelPayDate: "Дата",
                btnCancel: "Отмена", btnSave: "Сохранить", noData: "Нет записей", confirmDelete: "Удалить?",
                filterAll: "Все", filterLabel: "Учитель:"
            },
            en: {
                title: "Student Tracker", subtitle: "Package: 12 lessons/pack", addBtn: "Add Student",
                statTotal: "Active", statWarning: "Warning", statOverdue: "Due",
                thName: "Name", thTeacher: "Teacher", thProgress: "Progress", thRemaining: "Left", thLastPay: "Last Pay", thStatus: "Status", thActions: "Actions",
                statusPaid: "Paid", statusWarning: "Warning", statusOverdue: "Overdue",
                modalTitle: "Add New Student", labelName: "Name", labelTeacher: "Teacher", labelTotal: "Total", labelUsed: "Used", labelPayDate: "Date",
                btnCancel: "Cancel", btnSave: "Save", noData: "No data", confirmDelete: "Are you sure?",
                filterAll: "All", filterLabel: "Teacher Filter:"
            }
        };

        const teachers = ["Kanglaoshi", "Lilaoshi", "Pailaoshi", "Anlaoshi", "Tielaoshi", "Lanyinglaoshi"];
        let currentLang = 'zh';
        let selectedTeacher = 'all';
        let students = [
            { id: 1, name: 'Zhang Xiaoming', teacher: 'Kanglaoshi', totalLessons: 12, usedLessons: 10, lastPaymentDate: '2024-03-01' },
            { id: 2, name: 'Ali Karimov', teacher: 'Lilaoshi', totalLessons: 12, usedLessons: 12, lastPaymentDate: '2024-02-15' },
            { id: 3, name: 'Ivan Petrov', teacher: 'Anlaoshi', totalLessons: 12, usedLessons: 5, lastPaymentDate: '2024-04-10' }
        ];

        function setLang(lang) {
            currentLang = lang;
            document.getElementById('current-lang-label').innerText = lang;
            render();
        }

        function setTeacherFilter(teacher) {
            selectedTeacher = teacher;
            render();
        }

        function toggleModal(show) {
            const modal = document.getElementById('modal-overlay');
            modal.style.display = show ? 'flex' : 'none';
        }

        function addStudent(e) {
            e.preventDefault();
            const newStudent = {
                id: Date.now(),
                name: document.getElementById('input-name').value,
                teacher: document.getElementById('input-teacher').value,
                totalLessons: parseInt(document.getElementById('input-total').value),
                usedLessons: parseInt(document.getElementById('input-used').value),
                lastPaymentDate: document.getElementById('input-date').value
            };
            students.push(newStudent);
            document.getElementById('add-student-form').reset();
            toggleModal(false);
            render();
        }

        function updateLesson(id) {
            const student = students.find(s => s.id === id);
            if (student && student.usedLessons < student.totalLessons) {
                student.usedLessons++;
                render();
            }
        }

        function deleteStudent(id) {
            if (confirm(translations[currentLang].confirmDelete)) {
                students = students.filter(s => s.id !== id);
                render();
            }
        }

        function render() {
            const t = translations[currentLang];
            
            // Text UI
            document.getElementById('page-title').innerText = t.title;
            document.getElementById('page-subtitle').innerText = t.subtitle;
            document.getElementById('add-btn-text').innerText = t.addBtn;
            document.getElementById('stat-total-label').innerText = t.statTotal;
            document.getElementById('stat-warning-label').innerText = t.statWarning;
            document.getElementById('stat-overdue-label').innerText = t.statOverdue;
            document.getElementById('filter-label').innerText = t.filterLabel;
            document.getElementById('modal-title').innerText = t.modalTitle;
            document.getElementById('label-name').innerText = t.labelName;
            document.getElementById('label-teacher').innerText = t.labelTeacher;
            document.getElementById('label-total').innerText = t.labelTotal;
            document.getElementById('label-used').innerText = t.labelUsed;
            document.getElementById('label-date').innerText = t.labelPayDate;
            document.getElementById('btn-cancel').innerText = t.btnCancel;
            document.getElementById('btn-save').innerText = t.btnSave;
            document.getElementById('no-data-text').innerText = t.noData;

            // Filter Chips Rendering
            const filterContainer = document.getElementById('teacher-filter-container');
            filterContainer.innerHTML = '';
            
            // All option
            const allChip = document.createElement('button');
            allChip.className = `filter-chip px-4 py-1.5 rounded-full text-xs font-bold border transition-all ${selectedTeacher === 'all' ? 'bg-blue-600 text-white border-blue-600' : 'bg-white text-slate-500 border-slate-200 hover:bg-slate-50'}`;
            allChip.innerText = t.filterAll;
            allChip.onclick = () => setTeacherFilter('all');
            filterContainer.appendChild(allChip);

            // Individual teacher options
            teachers.forEach(teacher => {
                const chip = document.createElement('button');
                chip.className = `filter-chip px-4 py-1.5 rounded-full text-xs font-bold border transition-all ${selectedTeacher === teacher ? 'bg-blue-600 text-white border-blue-600' : 'bg-white text-slate-500 border-slate-200 hover:bg-slate-50'}`;
                chip.innerText = teacher;
                chip.onclick = () => setTeacherFilter(teacher);
                filterContainer.appendChild(chip);
            });

            // Filtering Data
            const filteredStudents = selectedTeacher === 'all' 
                ? students 
                : students.filter(s => s.teacher === selectedTeacher);

            // Stats (based on filtered data)
            const overdue = filteredStudents.filter(s => (s.totalLessons - s.usedLessons) <= 0).length;
            const warning = filteredStudents.filter(s => {
                let rem = s.totalLessons - s.usedLessons;
                return rem > 0 && rem <= 3;
            }).length;
            document.getElementById('stat-total-val').innerText = filteredStudents.length;
            document.getElementById('stat-warning-val').innerText = warning;
            document.getElementById('stat-overdue-val').innerText = overdue;

            // Table Head
            const head = document.getElementById('table-head-row');
            head.innerHTML = `
                <th class="px-6 py-5 text-xs font-bold text-slate-400 uppercase">${t.thName}</th>
                <th class="px-6 py-5 text-xs font-bold text-slate-400 uppercase">${t.thTeacher}</th>
                <th class="px-6 py-5 text-xs font-bold text-slate-400 uppercase">${t.thProgress}</th>
                <th class="px-6 py-5 text-xs font-bold text-slate-400 uppercase">${t.thRemaining}</th>
                <th class="px-6 py-5 text-xs font-bold text-slate-400 uppercase">${t.thLastPay}</th>
                <th class="px-6 py-5 text-xs font-bold text-slate-400 uppercase">${t.thStatus}</th>
                <th class="px-6 py-5 text-xs font-bold text-slate-400 uppercase text-right">${t.thActions}</th>
            `;

            // Table Body
            const tbody = document.getElementById('student-table-body');
            tbody.innerHTML = '';
            
            if (filteredStudents.length === 0) {
                document.getElementById('no-data').classList.remove('hidden');
            } else {
                document.getElementById('no-data').classList.add('hidden');
                filteredStudents.forEach(s => {
                    const remaining = s.totalLessons - s.usedLessons;
                    let statusLabel, statusClass;
                    if (remaining <= 0) {
                        statusLabel = t.statusOverdue; statusClass = "bg-rose-100 text-rose-700 border-rose-200";
                    } else if (remaining <= 3) {
                        statusLabel = t.statusWarning; statusClass = "bg-amber-100 text-amber-700 border-amber-200";
                    } else {
                        statusLabel = t.statusPaid; statusClass = "bg-emerald-100 text-emerald-700 border-emerald-200";
                    }

                    const tr = document.createElement('tr');
                    tr.className = "hover:bg-slate-50/50 transition-colors group";
                    tr.innerHTML = `
                        <td class="px-6 py-5 font-bold text-slate-700">${s.name}</td>
                        <td class="px-6 py-5"><span class="bg-slate-100 px-2 py-1 rounded-lg text-xs font-medium text-slate-600">${s.teacher}</span></td>
                        <td class="px-6 py-5">
                            <div class="flex items-center gap-2">
                                <span class="text-xs font-black text-slate-600">${s.usedLessons}</span>
                                <div class="w-16 h-1.5 bg-slate-100 rounded-full overflow-hidden">
                                    <div class="h-full rounded-full ${remaining <= 3 ? 'bg-amber-500' : 'bg-blue-600'}" style="width: ${(s.usedLessons/s.totalLessons)*100}%"></div>
                                </div>
                            </div>
                        </td>
                        <td class="px-6 py-5 font-black text-slate-800">${remaining}</td>
                        <td class="px-6 py-5 text-slate-500 text-sm font-medium">${s.lastPaymentDate || '---'}</td>
                        <td class="px-6 py-5">
                            <span class="px-3 py-1 rounded-full text-[10px] font-black uppercase border ${statusClass}">${statusLabel}</span>
                        </td>
                        <td class="px-6 py-5 text-right">
                            <div class="flex justify-end gap-1 opacity-0 group-hover:opacity-100 transition-opacity">
                                <button onclick="updateLesson(${s.id})" class="text-xs font-bold px-2 py-1 bg-blue-50 text-blue-600 rounded border border-blue-100">+1</button>
                                <button onclick="deleteStudent(${s.id})" class="p-1.5 text-rose-400"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
                            </div>
                        </td>
                    `;
                    tbody.appendChild(tr);
                });
            }
            lucide.createIcons();
        }

        document.getElementById('add-student-form').addEventListener('submit', addStudent);
        window.onload = render;
    </script>
</body>
</html>
