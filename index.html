<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>学生付费跟进管理 - NSRE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap');
        body { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        .filter-chip.active { background-color: #2563eb; color: white; border-color: #2563eb; }
        .spinner { border: 3px solid rgba(0, 0, 0, 0.1); width: 24px; height: 24px; border-radius: 50%; border-left-color: #2563eb; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .btn-active:active { transform: scale(0.95); transition: transform 0.1s; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .login-gradient { background: linear-gradient(135deg, #f8fafc 0%, #eff6ff 100%); }
        select:disabled { background-color: #f1f5f9; cursor: not-allowed; color: #94a3b8; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 min-h-screen">
    
    <!-- 登录页面 -->
    <div id="login-page" class="fixed inset-0 z-[200] flex items-center justify-center p-4 login-gradient">
        <div class="bg-white rounded-[2.5rem] shadow-2xl shadow-blue-100 w-full max-w-md p-10 text-center border border-white">
            
            <!-- NSRE Logo 区域 -->
            <div class="mb-8 text-center">
                <!-- 本地/GitHub 图片加载 -->
                <img src="./logo.png" alt="NSRE Logo" class="h-24 w-auto object-contain mx-auto drop-shadow-sm" onerror="this.style.display='none'; document.getElementById('logo-fallback').classList.remove('hidden');" />
                <!-- 如果找不到图片，显示的备用 NSRE 标志 -->
                <div id="logo-fallback" class="hidden w-24 h-24 bg-gradient-to-br from-blue-500 to-blue-700 rounded-3xl mx-auto flex items-center justify-center shadow-xl shadow-blue-200 rotate-3">
                    <span class="text-white font-black text-2xl tracking-widest -rotate-3">NSRE</span>
                </div>
            </div>

            <h2 id="login-title" class="text-3xl font-black text-slate-800 mb-2">学生付费跟进系统</h2>
            <p id="login-subtitle" class="text-slate-400 font-medium mb-8 text-sm">输入老师姓名，或输入 admin 进入管理员模式</p>
            
            <form id="login-form" class="space-y-4">
                <div class="relative">
                    <i data-lucide="user" class="absolute left-4 top-4 w-5 h-5 text-slate-300"></i>
                    <input id="login-username" type="text" required 
                        class="w-full pl-12 pr-4 py-4 bg-slate-50 border border-slate-100 rounded-2xl font-bold outline-none focus:ring-4 focus:ring-blue-500/10 focus:border-blue-500 transition-all" 
                        placeholder="用户名 (如: Kanglaoshi 或 admin)">
                </div>
                <div class="relative">
                    <i data-lucide="lock" class="absolute left-4 top-4 w-5 h-5 text-slate-300"></i>
                    <input id="login-password" type="password" required 
                        class="w-full pl-12 pr-4 py-4 bg-slate-50 border border-slate-100 rounded-2xl font-bold outline-none focus:ring-4 focus:ring-blue-500/10 focus:border-blue-500 transition-all" 
                        placeholder="密码 (默认: 1234)">
                </div>
                <button type="submit" class="w-full bg-blue-600 text-white py-4 rounded-2xl font-bold shadow-lg shadow-blue-200 hover:bg-blue-700 active:scale-[0.98] transition-all">
                    登 录
                </button>
            </form>
            <p id="login-error" class="text-rose-500 text-xs font-bold mt-4 hidden italic">用户名或密码错误，请检查后重试</p>
            
            <div class="mt-8 flex justify-center gap-2">
                <button onclick="setLang('zh')" class="text-[10px] font-black text-slate-400 hover:text-blue-600 uppercase tracking-widest">ZH</button>
                <span class="text-slate-200">|</span>
                <button onclick="setLang('uz')" class="text-[10px] font-black text-slate-400 hover:text-blue-600 uppercase tracking-widest">UZ</button>
                <span class="text-slate-200">|</span>
                <button onclick="setLang('ru')" class="text-[10px] font-black text-slate-400 hover:text-blue-600 uppercase tracking-widest">RU</button>
                <span class="text-slate-200">|</span>
                <button onclick="setLang('en')" class="text-[10px] font-black text-slate-400 hover:text-blue-600 uppercase tracking-widest">EN</button>
            </div>
        </div>
    </div>

    <!-- 主程序页面 (默认隐藏) -->
    <div id="app-content" class="max-w-6xl mx-auto p-4 md:p-8 hidden">
        <!-- Header -->
        <div class="flex flex-col md:flex-row md:items-center justify-between mb-8 gap-6">
            <div>
                <h1 id="page-title" class="text-3xl font-extrabold text-slate-800 tracking-tight">学生付费跟进管理</h1>
                <div class="flex items-center gap-3 mt-1">
                    <p id="page-subtitle" class="text-slate-500 font-medium text-sm">协作版 · 实时云同步</p>
                    <div id="sync-status" class="flex items-center gap-1.5 px-2 py-0.5 bg-emerald-50 text-[10px] text-emerald-600 font-bold uppercase tracking-widest rounded-full border border-emerald-100 hidden">
                        <span class="w-1.5 h-1.5 bg-emerald-500 rounded-full animate-pulse"></span>
                        <span id="sync-text">在线同步中</span>
                    </div>
                </div>
            </div>
            <div class="flex items-center gap-3">
                <!-- 登录用户信息 -->
                <div class="flex items-center gap-2 bg-white border border-slate-100 p-1.5 pr-4 rounded-xl shadow-sm mr-2">
                    <div class="w-8 h-8 bg-blue-100 text-blue-600 rounded-lg flex items-center justify-center font-black text-xs" id="user-avatar">?</div>
                    <span id="logged-user-name" class="text-xs font-black text-slate-700">---</span>
                    <button onclick="logout()" class="ml-2 text-slate-300 hover:text-rose-500 transition-colors" title="退出登录">
                        <i data-lucide="log-out" class="w-4 h-4"></i>
                    </button>
                </div>

                <div class="relative group">
                    <button class="flex items-center gap-2 bg-white border border-slate-200 px-4 py-2.5 rounded-xl text-slate-700 hover:bg-slate-50 transition-all shadow-sm">
                        <i data-lucide="languages" class="w-4 h-4 text-blue-500"></i>
                        <span id="current-lang-label" class="font-semibold uppercase text-sm">ZH</span>
                    </button>
                    <div class="absolute right-0 mt-2 w-36 bg-white border border-slate-100 rounded-xl shadow-xl opacity-0 invisible group-hover:opacity-100 group-hover:visible transition-all z-50 overflow-hidden text-sm">
                        <button onclick="setLang('zh')" class="w-full text-left px-4 py-2.5 hover:bg-blue-50 border-b border-slate-50">中文</button>
                        <button onclick="setLang('uz')" class="w-full text-left px-4 py-2.5 hover:bg-blue-50 border-b border-slate-50">O'zbek</button>
                        <button onclick="setLang('ru')" class="w-full text-left px-4 py-2.5 hover:bg-blue-50 border-b border-slate-50">Русский</button>
                        <button onclick="setLang('en')" class="w-full text-left px-4 py-2.5 hover:bg-blue-50 border-b border-slate-50">English</button>
                    </div>
                </div>
                <button onclick="openAddModal()" class="btn-active flex items-center justify-center gap-2 bg-blue-600 hover:bg-blue-700 text-white px-6 py-2.5 rounded-xl transition-all shadow-lg shadow-blue-200 font-bold">
                    <i data-lucide="plus" class="w-5 h-5"></i> 
                    <span id="add-btn-text">添加学生</span>
                </button>
            </div>
        </div>

        <!-- 统计 -->
        <div class="grid grid-cols-1 sm:grid-cols-3 gap-6 mb-8">
            <div class="bg-white p-6 rounded-2xl border border-slate-100 flex items-center gap-4 shadow-sm">
                <div class="p-4 bg-blue-50 text-blue-600 rounded-2xl"><i data-lucide="users" class="w-6 h-6"></i></div>
                <div><p id="stat-total-label" class="text-xs font-bold text-slate-400 uppercase tracking-wider">学生总数</p><p id="stat-total-val" class="text-3xl font-black text-slate-800 tracking-tight">0</p></div>
            </div>
            <div class="bg-white p-6 rounded-2xl border border-slate-100 flex items-center gap-4 shadow-sm">
                <div class="p-4 bg-amber-50 text-amber-600 rounded-2xl"><i data-lucide="timer" class="w-6 h-6"></i></div>
                <div><p id="stat-warning-label" class="text-xs font-bold text-slate-400 uppercase tracking-wider">即将到期</p><p id="stat-warning-val" class="text-3xl font-black text-amber-600 tracking-tight">0</p></div>
            </div>
            <div class="bg-white p-6 rounded-2xl border border-slate-100 flex items-center gap-4 shadow-sm">
                <div class="p-4 bg-rose-50 text-rose-600 rounded-2xl"><i data-lucide="wallet" class="w-6 h-6"></i></div>
                <div><p id="stat-overdue-label" class="text-xs font-bold text-slate-400 uppercase tracking-wider">需要缴费</p><p id="stat-overdue-val" class="text-3xl font-black text-rose-600 tracking-tight">0</p></div>
            </div>
        </div>

        <!-- 筛选区域 -->
        <div id="filter-section" class="mb-6 bg-white p-4 rounded-2xl border border-slate-100 shadow-sm flex flex-col gap-4 hidden">
            <!-- 老师筛选 (管理员专享) -->
            <div id="teacher-filter-wrap" class="flex flex-wrap items-center gap-2 hidden">
                <span id="filter-label" class="text-xs font-black text-slate-400 uppercase tracking-widest w-16 shrink-0">筛选老师:</span>
                <div id="teacher-filter-container" class="flex flex-wrap gap-2"></div>
            </div>
            <!-- 班级筛选 (所有人可见) -->
            <div id="class-filter-wrap" class="flex flex-wrap items-center gap-2">
                <span id="filter-class-label" class="text-xs font-black text-slate-400 uppercase tracking-widest w-16 shrink-0">筛选班级:</span>
                <div id="class-filter-container" class="flex flex-wrap gap-2"></div>
            </div>
        </div>

        <div id="main-content">
            <div id="loading-view" class="py-24 flex flex-col items-center justify-center bg-white rounded-3xl border border-slate-100">
                <div class="spinner mb-4"></div>
                <p id="loading-text" class="text-slate-400 font-medium animate-pulse italic">正在同步云端...</p>
            </div>

            <div id="error-view" class="hidden py-16 flex flex-col items-center justify-center bg-white rounded-3xl border border-rose-200 px-6 text-center shadow-sm">
                <div class="p-4 bg-rose-50 text-rose-600 rounded-full mb-4"><i data-lucide="alert-circle" class="w-8 h-8"></i></div>
                <h3 class="text-slate-800 font-black mb-2 text-xl">连接云端失败</h3>
                <p id="error-message" class="text-rose-500 font-mono text-sm mb-6 bg-rose-50 p-3 rounded-lg max-w-md w-full break-all"></p>
                <button onclick="location.reload()" class="bg-blue-600 text-white px-8 py-3 rounded-2xl font-bold active:scale-95">重试</button>
            </div>

            <div id="table-container" class="bg-white rounded-3xl shadow-sm border border-slate-100 overflow-hidden hidden">
                <div class="overflow-x-auto">
                    <table class="w-full text-left border-collapse">
                        <thead class="bg-slate-50/80 border-b border-slate-100">
                            <tr id="table-head-row"></tr>
                        </thead>
                        <tbody id="student-table-body" class="divide-y divide-slate-50"></tbody>
                    </table>
                </div>
                <div id="no-data" class="hidden py-20 text-center flex flex-col items-center">
                    <i data-lucide="users-round" class="w-12 h-12 text-slate-200 mb-4"></i>
                    <p id="no-data-text" class="text-slate-400 font-bold italic">暂无记录</p>
                </div>
            </div>
        </div>
    </div>

                <input type="hidden" id="input-id">

                    <label id="label-name" class="block text-[10px] font-black text-slate-400 uppercase mb-2 tracking-widest text-left">学生姓名</label>

                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label id="label-teacher" class="block text-[10px] font-black text-slate-400 uppercase mb-2 tracking-widest text-left">负责人</label>
                        <select id="input-teacher" required class="w-full px-5 py-3.5 bg-slate-50 border border-slate-100 rounded-2xl font-bold outline-none appearance-none">
                            <option value="" disabled id="opt-placeholder-teacher"></option>
                            <option value="Kanglaoshi">Kanglaoshi</option>
                            <option value="Lilaoshi">Lilaoshi</option>

                            <option value="Lanyinglaoshi">Lanyinglaoshi</option>
                            <option value="Zenglaoshi">Zenglaoshi</option>

                    <div>
                        <label id="label-class" class="block text-[10px] font-black text-slate-400 uppercase mb-2 tracking-widest text-left">班级</label>
                        <input id="input-class" list="class-list" type="text" class="w-full px-5 py-3.5 bg-slate-50 border border-slate-100 rounded-2xl font-bold outline-none focus:ring-4 focus:ring-blue-500/10 transition-all" placeholder="选择或输入">

                            <option value="HSK1-2"></option>
                            <option value="HSK1-3"></option>
                            <option value="HSK2-1"></option>
                            <option value="HSK2-2"></option>

                            <option value="HSK3-1"></option>

                            <option value="HSK3-3"></option>
                            <option value="HSK4"></option>
                            <option value="HSK5"></option>

                    </div>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label id="label-total" class="block text-[10px] font-black text-slate-400 uppercase mb-2 tracking-widest text-center">总量</label>
                        <input id="input-total" type="number" value="12" required class="w-full px-5 py-3.5 bg-slate-50 border border-slate-100 rounded-2xl font-bold outline-none text-center focus:ring-4 focus:ring-blue-500/10">
                    </div>
                    <div>
                        <label id="label-used" class="block text-[10px] font-black text-slate-400 uppercase mb-2 tracking-widest text-center">已上</label>
                        <input id="input-used" type="number" value="0" required class="w-full px-5 py-3.5 bg-slate-50 border border-slate-100 rounded-2xl font-bold outline-none text-center focus:ring-4 focus:ring-blue-500/10">
                    </div>
                </div>
                <div>
                    <label id="label-date" class="block text-[10px] font-black text-slate-400 uppercase mb-2 tracking-widest text-left">付费日期</label>
                    <input id="input-date" type="date" class="w-full px-5 py-3.5 bg-slate-50 border border-slate-100 rounded-2xl font-bold outline-none focus:ring-4 focus:ring-blue-500/10">
                </div>
                <div class="flex gap-4 pt-4">
                    <button type="button" onclick="toggleModal(false)" id="btn-cancel" class="flex-1 py-4 border border-slate-100 rounded-2xl font-bold text-slate-500 hover:bg-slate-50 transition-colors">取消</button>
                    <button type="submit" id="btn-save" class="flex-1 py-4 bg-blue-600 text-white font-bold rounded-2xl shadow-lg shadow-blue-200 active:scale-95 transition-all">保存</button>
                </div>
            </form>
        </div>
    </div>

            }
        };

        let currentLang = 'zh';
        let selectedTeacher = 'all';
        let selectedClass = 'all';
        let students = [];
        let isFirstLoad = true;
        let loggedUser = null;
        let isAdmin = false;

        const startApp = async () => {
            const app = initializeApp(firebaseConfig);
            const auth = getAuth(app);
            const db = getFirestore(app);
            try { await enableIndexedDbPersistence(db); } catch (e) {}

            onAuthStateChanged(auth, (user) => {
                if (user) {
                    const studentsCol = collection(db, 'students-data');
                    onSnapshot(query(studentsCol), (snapshot) => {
                        students = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                        if (isFirstLoad) {
                            document.getElementById('loading-view').classList.add('hidden');
                            document.getElementById('table-container').classList.remove('hidden');
                            document.getElementById('sync-status').classList.remove('hidden');
                            isFirstLoad = false;
                        }
                        if (loggedUser) render();
                    });
                }
            });

            // 无论身份验证是否成功，都确保执行登录检查逻辑
            try {
                await signInAnonymously(auth);
            } catch(e) {
                console.warn("匿名登录由于配置或网络受限:", e);
            }

            const checkLogin = () => {
                const savedUser = sessionStorage.getItem('loggedTeacher');
                if (savedUser && (teacherList.includes(savedUser) || savedUser === 'admin')) {
                    loggedUser = savedUser;
                    isAdmin = (savedUser === 'admin');
                    
                    document.getElementById('login-page').classList.add('hidden');
                    document.getElementById('app-content').classList.remove('hidden');
                    
                    document.getElementById('logged-user-name').innerText = isAdmin ? '管理员 (Admin)' : savedUser;
                    document.getElementById('user-avatar').innerText = isAdmin ? 'A' : savedUser.charAt(0).toUpperCase();

                    document.getElementById('filter-section').classList.remove('hidden');
                    if (!isAdmin) {
                        document.getElementById('teacher-filter-wrap').classList.add('hidden');
                    } else {
                        document.getElementById('teacher-filter-wrap').classList.remove('hidden');
                    }
                    
                    if (!isFirstLoad) render();
                }
            };

            document.getElementById('login-form').onsubmit = (e) => {
                e.preventDefault();
                const name = document.getElementById('login-username').value.trim();
                const pass = document.getElementById('login-password').value.trim();
                
                if (userCredentials[name] && userCredentials[name] === pass) {
                    sessionStorage.setItem('loggedTeacher', name);
                    checkLogin();
                } else {
                    const err = document.getElementById('login-error');
                    err.classList.remove('hidden');
                    setTimeout(() => err.classList.add('hidden'), 3000);
                }
            };

            window.logout = () => {
                sessionStorage.removeItem('loggedTeacher');
                location.reload();
            };

            checkLogin();

            window.setLang = (l) => { currentLang = l; document.getElementById('current-lang-label').innerText = l.toUpperCase(); render(); };
            window.setTeacherFilter = (t) => { selectedTeacher = t; selectedClass = 'all'; render(); };
            window.setClassFilter = (c) => { selectedClass = c; render(); };
            
            window.toggleModal = (show) => {
                const overlay = document.getElementById('modal-overlay');
                const box = document.getElementById('modal-box');
                if(show) { overlay.style.display = 'flex'; setTimeout(() => box.style.transform = 'scale(1)', 10); }
                else { box.style.transform = 'scale(0.95)'; setTimeout(() => overlay.style.display = 'none', 150); }
            };
            
            window.openAddModal = () => {
                document.getElementById('student-form').reset();
                document.getElementById('input-id').value = "";
                document.getElementById('input-class').value = "";
                document.getElementById('input-total').value = "12";
                document.getElementById('modal-title').innerText = tDict[currentLang].modalTitleAdd;
                
                const teacherSelect = document.getElementById('input-teacher');
                if (!isAdmin) {
                    teacherSelect.value = loggedUser;
                    teacherSelect.disabled = true;
                } else {
                    teacherSelect.value = "";
                    teacherSelect.disabled = false;
                }
                
                window.toggleModal(true);
            };
            
            window.openEditModal = (id) => {
                const s = students.find(item => item.id === id);
                if (!s) return;
                document.getElementById('input-id').value = s.id;
                document.getElementById('input-name').value = s.name;
                document.getElementById('input-class').value = s.studentClass || "";
                document.getElementById('input-total').value = s.totalLessons;
                document.getElementById('input-used').value = s.usedLessons;
                document.getElementById('input-date').value = s.lastPaymentDate || "";
                
                const teacherSelect = document.getElementById('input-teacher');
                teacherSelect.value = s.teacher;
                if (!isAdmin) {
                    teacherSelect.disabled = true;
                } else {
                    teacherSelect.disabled = false;
                }

                document.getElementById('modal-title').innerText = tDict[currentLang].modalTitleEdit;
                window.toggleModal(true);
            };
            
            document.getElementById('student-form').onsubmit = async (e) => {
                e.preventDefault();
                const id = document.getElementById('input-id').value;
                const data = {
                    name: document.getElementById('input-name').value,
                    studentClass: document.getElementById('input-class').value,
                    teacher: isAdmin ? document.getElementById('input-teacher').value : loggedUser,
                    totalLessons: parseInt(document.getElementById('input-total').value),
                    usedLessons: parseInt(document.getElementById('input-used').value),
                    lastPaymentDate: document.getElementById('input-date').value,
                    updatedAt: serverTimestamp()
                };
                window.toggleModal(false);
                if (id) await updateDoc(doc(db, 'students-data', id), data);
                else await setDoc(doc(collection(db, 'students-data')), data);
            };
            
            window.updateLesson = async (id) => {
                const s = students.find(item => item.id === id);
                // 解除 s.usedLessons < s.totalLessons 的限制，允许超额记课
                if (s) {
                    await updateDoc(doc(db, 'students-data', id), { usedLessons: s.usedLessons + 1, updatedAt: serverTimestamp() });
                }
            };
            
            window.deleteStudent = async (id) => {
                if (confirm(tDict[currentLang].confirmDelete)) {
                    await deleteDoc(doc(db, 'students-data', id));
                }
            };

            render(); // 初始化先渲染一次未登录界面语言
        };

        const render = () => {
            const t = tDict[currentLang];
            
            // 总是渲染登录页语言（免登录即生效）
            document.getElementById('login-title').innerText = t.loginTitle;
            document.getElementById('login-subtitle').innerText = t.loginSubtitle;
            document.getElementById('login-error').innerText = t.loginError;
            document.getElementById('login-username').placeholder = t.loginPlaceholder;
            document.getElementById('login-password').placeholder = t.loginPassPlaceholder;

            if (!loggedUser) return; // 未登录时不渲染后续主界面数据
            
            // 1. 先根据老师身份或管理员筛选条件，筛选出大名单
            let teacherFiltered = [];
            if (isAdmin) {
                teacherFiltered = selectedTeacher === 'all' ? students : students.filter(s => s.teacher === selectedTeacher);
            } else {
                teacherFiltered = students.filter(s => s.teacher === loggedUser);
            }

            // 2. 动态提取当前大名单下所有的班级
            const uniqueClasses = [...new Set(teacherFiltered.map(s => s.studentClass).filter(c => c))].sort();

            // 3. 结合班级筛选条件，得出最终显示的名单
            let filtered = selectedClass === 'all' ? teacherFiltered : teacherFiltered.filter(s => s.studentClass === selectedClass);
            
            document.getElementById('page-title').innerText = t.title;
            document.getElementById('page-subtitle').innerText = t.subtitle;
            document.getElementById('add-btn-text').innerText = t.addBtn;
            document.getElementById('stat-total-label').innerText = t.statTotal;
            document.getElementById('stat-warning-label').innerText = t.statWarning;
            document.getElementById('stat-overdue-label').innerText = t.statOverdue;
            document.getElementById('filter-label').innerText = t.filterLabel;
            document.getElementById('filter-class-label').innerText = t.filterClassLabel;
            document.getElementById('label-name').innerText = t.labelName;
            document.getElementById('label-teacher').innerText = t.labelTeacher;
            document.getElementById('label-class').innerText = t.labelClass;
            document.getElementById('input-class').placeholder = t.placeholderClass;
            document.getElementById('label-total').innerText = t.labelTotal;
            document.getElementById('label-used').innerText = t.labelUsed;
            document.getElementById('label-date').innerText = t.labelPayDate;
            document.getElementById('btn-cancel').innerText = t.btnCancel;
            document.getElementById('btn-save').innerText = t.btnSave;
            document.getElementById('opt-placeholder-teacher').innerText = t.labelTeacher;
            document.getElementById('no-data-text').innerText = t.noData;

            const overdue = filtered.filter(s => (s.totalLessons - s.usedLessons) <= 0).length;
            const warning = filtered.filter(s => { let r = s.totalLessons - s.usedLessons; return r > 0 && r <= 3; }).length;
            document.getElementById('stat-total-val').innerText = filtered.length;
            document.getElementById('stat-warning-val').innerText = warning;
            document.getElementById('stat-overdue-val').innerText = overdue;

            if (isAdmin) {
                const fc = document.getElementById('teacher-filter-container');
                fc.innerHTML = `<button onclick="setTeacherFilter('all')" class="filter-chip px-5 py-2 rounded-full text-[10px] font-black uppercase tracking-wider border transition-all ${selectedTeacher==='all'?'active':''} shadow-sm">${t.filterAll}</button>`;
                teacherList.forEach(name => {
                    fc.innerHTML += `<button onclick="setTeacherFilter('${name}')" class="filter-chip px-5 py-2 rounded-full text-[10px] font-black uppercase tracking-wider border transition-all ${selectedTeacher===name?'active':''} shadow-sm">${name}</button>`;
                });
            }

            // 班级筛选渲染 (所有人可见，动态生成按钮)
            const classFc = document.getElementById('class-filter-container');
            classFc.innerHTML = `<button onclick="setClassFilter('all')" class="filter-chip px-5 py-2 rounded-full text-[10px] font-black uppercase tracking-wider border transition-all ${selectedClass==='all'?'active':''} shadow-sm">${t.filterAll}</button>`;
            uniqueClasses.forEach(cls => {
                classFc.innerHTML += `<button onclick="setClassFilter('${cls}')" class="filter-chip px-5 py-2 rounded-full text-[10px] font-black uppercase tracking-wider border transition-all ${selectedClass===cls?'active':''} shadow-sm">${cls}</button>`;
            });

            document.getElementById('table-head-row').innerHTML = `
                <th class="px-4 py-4 text-[10px] font-black text-slate-400 uppercase tracking-widest whitespace-nowrap min-w-[120px] w-40">${t.thName}</th>
                <th class="px-4 py-4 text-[10px] font-black text-slate-400 uppercase tracking-widest whitespace-nowrap">${t.thTeacher}</th>
                <th class="px-4 py-4 text-[10px] font-black text-slate-400 uppercase tracking-widest whitespace-nowrap">${t.thClass}</th>
                <th class="px-4 py-4 text-[10px] font-black text-slate-400 uppercase tracking-widest whitespace-nowrap w-24">${t.thProgress}</th>
                <th class="px-4 py-4 text-[10px] font-black text-slate-400 uppercase tracking-widest whitespace-nowrap">${t.thRemaining}</th>
                <th class="px-4 py-4 text-[10px] font-black text-slate-400 uppercase tracking-widest whitespace-nowrap">${t.thLastPay}</th>
                <th class="px-4 py-4 text-[10px] font-black text-slate-400 uppercase tracking-widest whitespace-nowrap min-w-[80px]">${t.thStatus}</th>
                <th class="px-4 py-4 text-[10px] font-black text-slate-400 uppercase tracking-widest text-right whitespace-nowrap w-20">${t.thActions}</th>
            `;

            const tbody = document.getElementById('student-table-body');
            tbody.innerHTML = '';
            if (filtered.length === 0) { document.getElementById('no-data').classList.remove('hidden'); } 
            else {
                document.getElementById('no-data').classList.add('hidden');
                filtered.sort((a,b) => (a.totalLessons - a.usedLessons) - (b.totalLessons - b.usedLessons)).forEach(s => {
                    const rem = s.totalLessons - s.usedLessons;
                    let stLabel = t.statusPaid, stClass = "bg-emerald-100 text-emerald-700 border-emerald-200 shadow-emerald-50";
                    if (rem <= 0) { stLabel = t.statusOverdue; stClass = "bg-rose-100 text-rose-700 border-rose-200 shadow-rose-50"; }
                    else if (rem <= 3) { stLabel = t.statusWarning; stClass = "bg-amber-100 text-amber-700 border-amber-200 shadow-amber-50"; }
                    
                    tbody.innerHTML += `
                        <tr class="hover:bg-slate-50/50 transition-colors group">
                            <td class="px-4 py-4">
                                <div class="font-bold text-slate-700 text-sm whitespace-normal break-words line-clamp-2 min-w-[120px] w-40" title="${s.name}">${s.name}</div>
                            </td>
                            <td class="px-4 py-4"><span class="bg-slate-100 px-3 py-1 rounded-lg text-[10px] font-bold text-slate-500 uppercase tracking-wider whitespace-nowrap">${s.teacher}</span></td>
                            <td class="px-4 py-4 font-bold text-blue-600 text-[11px] uppercase whitespace-nowrap">${s.studentClass || '---'}</td>
                            <td class="px-4 py-4 w-24">
                                <div class="flex items-center gap-2">
                                    <span class="text-xs font-black ${rem < 0 ? 'text-rose-600' : 'text-slate-400'} w-4">${s.usedLessons}</span>
                                    <div class="w-12 h-2 bg-slate-100 rounded-full overflow-hidden shadow-inner shrink-0">
                                        <div class="h-full rounded-full transition-all duration-700 ${rem < 0 ? 'bg-rose-600' : (rem<=3 ? 'bg-amber-500' : 'bg-blue-600')}" style="width: ${Math.min((s.usedLessons/s.totalLessons)*100, 100)}%"></div>
                                    </div>
                                </div>
                            </td>
                            <td class="px-4 py-4 font-black ${rem < 0 ? 'text-rose-600' : 'text-slate-800'} text-lg">${rem}</td>
                            <td class="px-4 py-4 text-slate-500 text-xs font-medium whitespace-nowrap">${s.lastPaymentDate || '---'}</td>
                            <td class="px-4 py-4 whitespace-nowrap">
                                <span class="px-3 py-1.5 rounded-full text-[10px] font-black uppercase tracking-wider border shadow-sm inline-block text-center min-w-[70px] ${stClass}">${stLabel}</span>
                            </td>
                            <td class="px-4 py-4 text-right whitespace-nowrap w-20">
                                <div class="flex justify-end gap-1">
                                    <button onclick="updateLesson('${s.id}')" class="btn-active text-[10px] font-bold px-3 py-1.5 bg-blue-50 text-blue-600 rounded-lg border border-blue-100 shadow-sm whitespace-nowrap">${t.actionPlus}</button>
                                    <button onclick="openEditModal('${s.id}')" class="p-2 text-slate-300 hover:text-blue-500 transition-colors"><i data-lucide="edit-3" class="w-4 h-4"></i></button>
                                    <button onclick="deleteStudent('${s.id}')" class="p-2 text-rose-300 hover:text-rose-600 transition-colors"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
                                </div>
                            </td>
                        </tr>
                    `;
                });
            }
            lucide.createIcons();
        };

        startApp();
    </script>
</body>
</html>
