                    const studentsCol = collection(db, 'artifacts', appId, 'public', 'data', 'students');
                    onSnapshot(query(studentsCol), (snapshot) => {
                        students = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                        render();
                        if (currentHistoryStudentId && document.getElementById('history-modal-overlay').style.display === 'flex') {
                            window.openHistoryModal(currentHistoryStudentId);
                        }
                    });
                }
            });

            await signInAnonymously(auth);

            const checkLogin = () => {
                const savedUser = sessionStorage.getItem('loggedTeacher');
                if (savedUser && (teacherList.includes(savedUser) || savedUser === 'admin')) {
                    loggedUser = savedUser;
                    isAdmin = (savedUser === 'admin');
                    document.getElementById('login-page').classList.add('hidden');
                    document.getElementById('app-content').classList.remove('hidden');
                    document.getElementById('logged-user-name').innerText = isAdmin ? 'Admin' : savedUser;
                    document.getElementById('user-avatar').innerText = isAdmin ? 'A' : savedUser.charAt(0).toUpperCase();
                    document.getElementById('teacher-filter-wrap').classList.toggle('hidden', !isAdmin);
                    render();
                }
            };

            document.getElementById('login-form').onsubmit = (e) => {
                e.preventDefault();
                const name = document.getElementById('login-username').value.trim();
                const pass = document.getElementById('login-password').value.trim();
                if (userCredentials[name] && userCredentials[name] === pass) {
                    sessionStorage.setItem('loggedTeacher', name);
                    checkLogin();
                } else {
                    const err = document.getElementById('login-error');
                    err.classList.remove('hidden');
                    setTimeout(() => err.classList.add('hidden'), 3000);
                }
            };

            window.logout = () => { sessionStorage.removeItem('loggedTeacher'); location.reload(); };
            window.setLang = (l) => { currentLang = l; render(); };
            window.setTeacherFilter = (t) => { selectedTeacher = t; selectedClass = 'all'; render(); };
            window.setClassFilter = (c) => { selectedClass = c; render(); };
            window.setStatusFilter = (s) => { selectedStatus = s; render(); };
            
            window.toggleModal = (show) => {
                document.getElementById('modal-overlay').style.display = show ? 'flex' : 'none';
            };

            window.toggleHistoryModal = (show) => {
                if (!show) window.cancelRecordEdit();
                document.getElementById('history-modal-overlay').style.display = show ? 'flex' : 'none';
            };

            window.openHistoryModal = (id) => {
                currentHistoryStudentId = id;
                const s = students.find(item => item.id === id);
                if (!s) return;
                const t = tDict[currentLang] || tDict['zh'];
                document.getElementById('history-modal-title').innerText = s.name + ' - ' + t.historyTitle;
                document.getElementById('btn-close-history').innerText = t.btnClose;
                
                const list = document.getElementById('history-list');
                list.innerHTML = '';
                const history = s.attendanceHistory || [];
                
                if (history.length === 0) {
                    list.innerHTML = `<p class="text-slate-400 text-sm italic text-center py-10">${t.historyEmpty}</p>`;
                } else {
                    [...history].reverse().forEach((record, revIndex) => {
                        const originalIndex = history.length - 1 - revIndex;
                        list.innerHTML += `
                            <div class="flex items-center justify-between p-4 bg-slate-50 rounded-2xl border border-slate-100 group">
                                <div class="flex items-center gap-4">
                                    <div class="w-8 h-8 rounded-full bg-blue-100 text-blue-600 flex items-center justify-center text-xs font-black shadow-sm">${history.length - revIndex}</div>
                                    <span class="text-sm font-bold text-slate-700">${record}</span>
                                </div>
                                <div class="flex items-center gap-1">
                                    <button onclick="startEditRecord(${originalIndex}, '${record}')" class="p-2 text-slate-300 hover:text-blue-500 transition-colors"><i data-lucide="edit-2" class="w-4 h-4"></i></button>
                                    <button onclick="deleteRecord(${originalIndex})" class="p-2 text-slate-300 hover:text-rose-500 transition-colors"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
                                </div>
                            </div>
                        `;
                    });
                }
                window.toggleHistoryModal(true);
                lucide.createIcons();
            };

            window.startEditRecord = (index, currentText) => {
                editingRecordIndex = index;
                const dateMatch = currentText.match(/\d{4}-\d{2}-\d{2}/);
                if (dateMatch) document.getElementById('manual-date-input').value = dateMatch[0];
                document.getElementById('btn-record-action').innerText = tDict[currentLang].btnUpdate;
                document.getElementById('btn-record-cancel').classList.remove('hidden');
            };

            window.cancelRecordEdit = () => {
                editingRecordIndex = -1;
                document.getElementById('manual-date-input').value = "";
                document.getElementById('btn-record-action').innerText = tDict[currentLang].manualAdd;
                document.getElementById('btn-record-cancel').classList.add('hidden');
            };

            window.handleRecordAction = async () => {
                if (editingRecordIndex >= 0) await updateManualRecord();
                else await addManualRecord();
            };

            window.addManualRecord = async () => {
                const dateVal = document.getElementById('manual-date-input').value;
                if (!dateVal) return alert(tDict[currentLang].alertNoDate);
                const s = students.find(item => item.id === currentHistoryStudentId);
                if (s) {
                    const dateObj = new Date(dateVal.replace(/-/g, "/"));
                    const dayName = tDict[currentLang].days[dateObj.getDay()];
                    const formattedDate = `${dateVal} (${dayName})`;
                    await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'students', currentHistoryStudentId), {
                        usedLessons: s.usedLessons + 1,
                        attendanceHistory: [...(s.attendanceHistory || []), formattedDate]
                    });
                    document.getElementById('manual-date-input').value = "";
                }
            };

            window.updateManualRecord = async () => {
                const dateVal = document.getElementById('manual-date-input').value;
                if (!dateVal) return alert(tDict[currentLang].alertNoDate);
                const s = students.find(item => item.id === currentHistoryStudentId);
                if (s && editingRecordIndex >= 0) {
                    const dateObj = new Date(dateVal.replace(/-/g, "/"));
                    const dayName = tDict[currentLang].days[dateObj.getDay()];
                    const formattedDate = `${dateVal} (${dayName})`;
                    const newHistory = [...(s.attendanceHistory || [])];
                    newHistory[editingRecordIndex] = formattedDate;
                    await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'students', currentHistoryStudentId), { attendanceHistory: newHistory });
                    window.cancelRecordEdit();
                }
            };

            window.deleteRecord = async (index) => {
                if (!confirm(tDict[currentLang].confirmDeleteRecord)) return;
                const s = students.find(item => item.id === currentHistoryStudentId);
                if (s) {
                    const newHistory = [...(s.attendanceHistory || [])];
                    newHistory.splice(index, 1);
                    await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'students', currentHistoryStudentId), {
                        usedLessons: Math.max(0, s.usedLessons - 1),
                        attendanceHistory: newHistory
                    });
                }
            };

            window.openAddModal = () => {
                document.getElementById('student-form').reset();
                document.getElementById('input-id').value = "";
                const sel = document.getElementById('input-teacher');
                sel.innerHTML = teacherList.map(t => `<option value="${t}">${t}</option>`).join('');
                if (!isAdmin) { sel.value = loggedUser; sel.disabled = true; }
                else { sel.disabled = false; }
                const ts = document.getElementById('input-total');
                ts.innerHTML = [12,24,36,48,60,72,84,96,108,120,144].map(v => `<option value="${v}">${v} 节</option>`).join('');
                document.getElementById('modal-title').innerText = tDict[currentLang].modalTitleAdd;
                window.toggleModal(true);
            };

            window.openEditModal = (id) => {
                const s = students.find(item => item.id === id);
                document.getElementById('input-id').value = s.id;
                document.getElementById('input-name').value = s.name;
                document.getElementById('input-class').value = s.studentClass || "";
                const sel = document.getElementById('input-teacher');
                sel.innerHTML = teacherList.map(t => `<option value="${t}">${t}</option>`).join('');
                sel.value = s.teacher;
                sel.disabled = !isAdmin;
                const ts = document.getElementById('input-total');
                ts.innerHTML = [12,24,36,48,60,72,84,96,108,120,144].map(v => `<option value="${v}">${v} 节</option>`).join('');
                ts.value = s.totalLessons;
                document.getElementById('input-used').value = s.usedLessons;
                document.getElementById('input-date').value = s.lastPaymentDate || "";
                document.getElementById('modal-title').innerText = tDict[currentLang].modalTitleEdit;
                window.toggleModal(true);
            };

            document.getElementById('student-form').onsubmit = async (e) => {
                e.preventDefault();
                const id = document.getElementById('input-id').value;
                const data = {
                    name: document.getElementById('input-name').value,
                    studentClass: document.getElementById('input-class').value,
                    teacher: document.getElementById('input-teacher').value,
                    totalLessons: parseInt(document.getElementById('input-total').value),
                    usedLessons: parseInt(document.getElementById('input-used').value),
                    lastPaymentDate: document.getElementById('input-date').value,
                    updatedAt: serverTimestamp()
                };
                window.toggleModal(false);
                if (id) await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'students', id), data);
                else {
                    data.attendanceHistory = [];
                    await setDoc(doc(collection(db, 'artifacts', appId, 'public', 'data', 'students')), data);
                }
            };

            window.updateLesson = async (id) => {
                const s = students.find(item => item.id === id);
                if (s) {
                    const now = new Date();
                    const dayName = tDict[currentLang].days[now.getDay()];
                    const ds = now.getFullYear() + '-' + String(now.getMonth()+1).padStart(2,'0') + '-' + String(now.getDate()).padStart(2,'0') + ` (${dayName}) ` + String(now.getHours()).padStart(2,'0') + ':' + String(now.getMinutes()).padStart(2,'0');
                    await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'students', id), {
                        usedLessons: s.usedLessons + 1,
                        attendanceHistory: [...(s.attendanceHistory || []), ds]
                    });
                }
            };

            window.deleteStudent = async (id) => {
                if (confirm(tDict[currentLang].confirmDelete)) await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'students', id));
            };

            checkLogin();
        };

        const render = () => {
            const t = tDict[currentLang] || tDict['zh'];
            document.getElementById('login-title').innerText = t.loginTitle;
            document.getElementById('login-subtitle').innerText = t.loginSubtitle;
            document.getElementById('login-username').placeholder = t.loginPlaceholder;
            document.getElementById('login-password').placeholder = t.loginPassPlaceholder;
            if (!loggedUser) return;

            document.getElementById('current-lang-text').innerText = currentLang.toUpperCase();
            document.querySelectorAll('.lang-item').forEach(btn => {
                btn.classList.toggle('active', btn.id === `item-lang-${currentLang}`);
            });

            let baseFiltered = isAdmin ? (selectedTeacher === 'all' ? students : students.filter(s => s.teacher === selectedTeacher)) : students.filter(s => s.teacher === loggedUser);
            const classes = [...new Set(baseFiltered.map(s => s.studentClass).filter(c => c))].sort();
            let classFiltered = selectedClass === 'all' ? baseFiltered : baseFiltered.filter(s => s.studentClass === selectedClass);
            let filtered = classFiltered.filter(s => {
                if (selectedStatus === 'all') return true;
                const r = s.totalLessons - s.usedLessons;
                if (selectedStatus === 'paid') return r > 3;
                if (selectedStatus === 'warning') return r > 0 && r <= 3;
                if (selectedStatus === 'overdue') return r <= 0;
                return true;
            });

            document.getElementById('page-title').innerText = t.title;
            document.getElementById('add-btn-text').innerText = t.addBtn;
            document.getElementById('stat-total-val').innerText = classFiltered.length;
            document.getElementById('stat-warning-val').innerText = classFiltered.filter(s => { let r = s.totalLessons - s.usedLessons; return r > 0 && r <= 3; }).length;
            document.getElementById('stat-overdue-val').innerText = classFiltered.filter(s => (s.totalLessons - s.usedLessons) <= 0).length;

            if (isAdmin) {
                const tc = document.getElementById('teacher-filter-container');
                tc.innerHTML = `<button onclick="setTeacherFilter('all')" class="filter-chip px-4 py-2 rounded-xl text-[10px] font-black border ${selectedTeacher==='all'?'active':''} transition-all shadow-sm">${t.filterAll}</button>`;
                teacherList.forEach(name => tc.innerHTML += `<button onclick="setTeacherFilter('${name}')" class="filter-chip px-4 py-2 rounded-xl text-[10px] font-black border ${selectedTeacher===name?'active':''} transition-all shadow-sm">${name}</button>`);
            }

            const cc = document.getElementById('class-filter-container');
            cc.innerHTML = `<button onclick="setClassFilter('all')" class="filter-chip px-4 py-2 rounded-xl text-[10px] font-black border ${selectedClass==='all'?'active':''} transition-all shadow-sm">${t.filterAll}</button>`;
            classes.forEach(c => cc.innerHTML += `<button onclick="setClassFilter('${c}')" class="filter-chip px-4 py-2 rounded-xl text-[10px] font-black border ${selectedClass===c?'active':''} transition-all shadow-sm">${c}</button>`);

            const sc = document.getElementById('status-filter-container');
            sc.innerHTML = `
                <button onclick="setStatusFilter('all')" class="filter-chip px-4 py-2 rounded-xl text-[10px] font-black border ${selectedStatus==='all'?'active':''} transition-all shadow-sm">${t.filterAll}</button>
                <button onclick="setStatusFilter('paid')" class="filter-chip px-4 py-2 rounded-xl text-[10px] font-black border ${selectedStatus==='paid'?'active':''} transition-all shadow-sm">${t.statusPaid}</button>
                <button onclick="setStatusFilter('warning')" class="filter-chip px-4 py-2 rounded-xl text-[10px] font-black border ${selectedStatus==='warning'?'active':''} transition-all shadow-sm">${t.statusWarning}</button>
                <button onclick="setStatusFilter('overdue')" class="filter-chip px-4 py-2 rounded-xl text-[10px] font-black border ${selectedStatus==='overdue'?'active':''} transition-all shadow-sm">${t.statusOverdue}</button>
            `;

            document.getElementById('table-head-row').innerHTML = `<th class="px-4 py-4 min-w-[120px] w-40 text-[10px] font-black text-slate-400 uppercase tracking-widest">${t.thName}</th><th class="px-4 py-4 text-[10px] font-black text-slate-400 uppercase tracking-widest">${t.thTeacher}</th><th class="px-4 py-4 text-[10px] font-black text-slate-400 uppercase tracking-widest">${t.thClass}</th><th class="px-4 py-4 w-24 text-[10px] font-black text-slate-400 uppercase tracking-widest">${t.thProgress}</th><th class="px-4 py-4 text-[10px] font-black text-slate-400 uppercase tracking-widest">${t.thRemaining}</th><th class="px-4 py-4 text-[10px] font-black text-slate-400 uppercase tracking-widest">${t.thLastPay}</th><th class="px-4 py-4 text-[10px] font-black text-slate-400 uppercase tracking-widest">${t.thStatus}</th><th class="px-4 py-4 text-right w-20 text-[10px] font-black text-slate-400 uppercase tracking-widest">${t.thActions}</th>`;

            const tbody = document.getElementById('student-table-body');
            tbody.innerHTML = '';
            filtered.sort((a,b) => (a.totalLessons-a.usedLessons) - (b.totalLessons-b.usedLessons)).forEach(s => {
                const rem = s.totalLessons - s.usedLessons;
                const status = rem <= 0 ? {l:t.statusOverdue, c:"bg-rose-100 text-rose-700"} : (rem <= 3 ? {l:t.statusWarning, c:"bg-amber-100 text-amber-700"} : {l:t.statusPaid, c:"bg-emerald-100 text-emerald-700"});
                tbody.innerHTML += `
                    <tr class="hover:bg-slate-50 transition-colors">
                        <td class="px-4 py-4"><div onclick="openHistoryModal('${s.id}')" class="font-bold text-blue-600 text-sm whitespace-normal break-words line-clamp-2 min-w-[120px] w-40 cursor-pointer flex items-center gap-1 hover:underline"><i data-lucide="calendar-clock" class="w-3 h-3 text-blue-300"></i> ${s.name}</div></td>
                        <td class="px-4 py-4"><span class="bg-slate-100 px-2 py-1 rounded text-[10px] font-bold text-slate-500 uppercase tracking-wider">${s.teacher}</span></td>
                        <td class="px-4 py-4 font-bold text-blue-600 text-[11px] uppercase whitespace-nowrap">${s.studentClass || '---'}</td>
                        <td class="px-4 py-4 w-24"><div class="flex items-center gap-2"><span class="text-xs font-black ${rem<0?'text-rose-600':'text-slate-400'}">${s.usedLessons}</span><div class="w-10 h-2 bg-slate-100 rounded-full overflow-hidden shadow-inner"><div class="h-full ${rem<0?'bg-rose-600':(rem<=3?'bg-amber-500':'bg-blue-600')}" style="width:${Math.min((s.usedLessons/s.totalLessons)*100,100)}%"></div></div></div></td>
                        <td class="px-4 py-4 font-black ${rem<0?'text-rose-600':'text-slate-800'} text-lg">${rem}</td>
                        <td class="px-4 py-4 text-slate-500 text-xs font-medium">${s.lastPaymentDate || '---'}</td>
                        <td class="px-4 py-4"><span class="px-2 py-1 rounded-full text-[10px] font-black border whitespace-nowrap shadow-sm ${status.c}">${status.l}</span></td>
                        <td class="px-4 py-4 text-right whitespace-nowrap w-20"><div class="flex justify-end gap-1"><button onclick="updateLesson('${s.id}')" class="bg-blue-50 text-blue-600 text-[10px] font-bold px-2 py-1 rounded-lg border border-blue-100 active:scale-95 transition-all shadow-sm">${t.actionPlus}</button><button onclick="openEditModal('${s.id}')" class="p-1.5 text-slate-300 hover:text-blue-500 transition-colors"><i data-lucide="edit-3" class="w-4 h-4"></i></button><button onclick="deleteStudent('${s.id}')" class="p-1.5 text-rose-300 hover:text-rose-600 transition-colors"><i data-lucide="trash-2" class="w-4 h-4"></i></button></div></td>
                    </tr>
                `;
            });
            
            document.getElementById('label-name').innerText = t.labelName;
            document.getElementById('label-teacher').innerText = t.labelTeacher;
            document.getElementById('label-class').innerText = t.labelClass;
            document.getElementById('label-total').innerText = t.labelTotal;
            document.getElementById('label-used').innerText = t.labelUsed;
            document.getElementById('label-date').innerText = t.labelPayDate;
            document.getElementById('btn-cancel').innerText = t.btnCancel;
            document.getElementById('btn-save').innerText = t.btnSave;
            document.getElementById('btn-record-action').innerText = editingRecordIndex >= 0 ? t.btnUpdate : t.manualAdd;
            document.getElementById('btn-close-history').innerText = t.btnClose;
            document.getElementById('filter-label').innerText = t.filterLabel;
            document.getElementById('filter-class-label').innerText = t.filterClassLabel;
            document.getElementById('filter-status-label').innerText = t.filterStatusLabel;

            lucide.createIcons();
        };

        startApp();
    </script>
</body>
</html>
